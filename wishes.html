<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Wishes - Celebrate!</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&amp;family=Quicksand:wght@500;600&amp;family=Plus+Jakarta+Sans:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#191b29",
              "tertiary-fixed-dim": "#debfc2",
              "surface-container-high": "#eae8e7",
              "surface-dim": "#dbd9d9",
              outline: "#82746b",
              "inverse-surface": "#303030",
              "on-surface": "#f2f0f0",
              "secondary-fixed-dim": "#c5c5d8",
              "on-secondary-container": "#626374",
              "inverse-on-surface": "#1b1c1c",
              background: "#fbf9f8",
              "tertiary-container": "#edced1",
              secondary: "#5c5d6e",
              "on-tertiary-fixed": "#281719",
              "on-primary-fixed-variant": "#623f22",
              "on-primary-fixed": "#2f1500",
              "secondary-container": "#e1e1f5",
              "primary-fixed-dim": "#efbc96",
              "surface-bright": "#fbf9f8",
              "on-background": "#1b1c1c",
              "on-secondary": "#ffffff",
              error: "#ba1a1a",
              "inverse-primary": "#efbc96",
              "on-tertiary": "#ffffff",
              "on-tertiary-container": "#6e5659",
              "surface-container-low": "#f5f3f3",
              "on-tertiary-fixed-variant": "#574144",
              "on-primary": "#ffffff",
              surface: "#fbf9f8",
              tertiary: "#70585b",
              "primary-container": "#ffcba4",
              "surface-container-highest": "#e4e2e2",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "primary-fixed": "#ffdcc3",
              "surface-tint": "#7c5637",
              "error-container": "#ffdad6",
              "surface-variant": "#e4e2e2",
              "on-primary-container": "#7a5435",
              "on-error": "#ffffff",
              "on-secondary-fixed-variant": "#444655",
              "outline-variant": "#d4c3b9",
              "secondary-fixed": "#e1e1f5",
              "on-surface-variant": "#e8ddd4",
              "tertiary-fixed": "#fbdbde",
              primary: "#ffdcc3",
              "surface-container": "#efeded",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xs: "4px",
              sm: "12px",
              "container-margin": "24px",
              xl: "80px",
              base: "8px",
              gutter: "16px",
              md: "24px",
              lg: "48px",
            },
            fontFamily: {
              "headline-md": ["Bricolage Grotesque"],
              "body-md": ["Quicksand"],
              "body-lg": ["Quicksand"],
              "headline-lg": ["Bricolage Grotesque"],
              "label-md": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "700" }],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "500" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "500" }],
              "headline-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "800" }],
              "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "600" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: 100vh;
        overflow: hidden;
        margin: 0;
        padding: 0;
        filter: brightness(1.1) contrast(1) saturate(1.05) drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
      }
      #snow-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
      }
      .lens-blur {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        -webkit-mask-image: radial-gradient(circle at center, transparent 40%, black 90%);
        mask-image: radial-gradient(circle at center, transparent 40%, black 90%);
      }
      .glass-card {
        backdrop-filter: blur(12px);
        background: rgba(0, 0, 0, 0.45);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      .wish-card {
        backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.12);
        transition: transform 0.2s ease;
      }
      .wish-card:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body class="font-body-md text-on-surface">
    <canvas id="snow-canvas"></canvas>
    <div class="lens-blur" aria-hidden="true"></div>
    <div class="max-w-2xl mx-auto px-container-margin py-xl relative z-10">
      <div class="text-center mb-lg">
        <a href="/" class="inline-flex items-center gap-sm text-primary hover:opacity-80 mb-md font-label-md">
          <span class="material-symbols-outlined">arrow_back</span>
          Back
        </a>
        <h1 class="font-headline-lg text-headline-lg text-primary mb-sm">
          All Wishes 💝
        </h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant">
          Every wish sent from the gift box
        </p>
      </div>
      <div id="wishes-list" class="flex flex-col gap-md"></div>
      <div id="loading" class="text-center text-on-surface-variant py-xl font-body-lg">
        Loading wishes...
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script>
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const wishesList = document.getElementById('wishes-list');
      const loading = document.getElementById('loading');

      db.collection('wishes')
        .orderBy('timestamp', 'desc')
        .onSnapshot((snapshot) => {
          loading.style.display = 'none';

          if (snapshot.empty) {
            wishesList.innerHTML = `
              <div class="glass-card rounded-xl p-lg text-center">
                <p class="text-on-surface-variant font-body-lg">No wishes yet! Be the first to make one ✨</p>
                <a href="/" class="inline-block mt-md text-primary font-label-md underline">Make a wish</a>
              </div>
            `;
            return;
          }

          wishesList.innerHTML = snapshot.docs.map((doc) => {
            const data = doc.data();
            const time = data.timestamp
              ? new Date(data.timestamp.seconds * 1000).toLocaleString()
              : 'just now';
            return `
              <div class="wish-card rounded-xl p-md flex items-start justify-between gap-md">
                <div class="flex-1">
                  <p class="font-body-lg text-on-surface">${escapeHtml(data.text)}</p>
                  <p class="font-label-md text-on-surface-variant/60 mt-xs text-xs">${time}</p>
                </div>
                <button onclick="deleteWish('${doc.id}')" aria-label="Delete wish" class="text-on-surface-variant/40 hover:text-error transition-colors flex-shrink-0">
                  <span class="material-symbols-outlined text-xl" aria-hidden="true">delete</span>
                </button>
              </div>
            `;
          }).join('');
        });

      function deleteWish(id) {
        db.collection('wishes').doc(id).delete().catch(err => console.error("Delete failed:", err));
      }

      const escapeDiv = document.createElement('div');
      function escapeHtml(str) {
        escapeDiv.textContent = str;
        return escapeDiv.innerHTML;
      }
    </script>
    <script src="snow-bg.js"></script>
  </body>
</html>
